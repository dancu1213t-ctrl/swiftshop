<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <title>SwiftShop</title>

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbzTb0OrpD0fE_0bg9tC44FgksNeEA0bdYaypA08ofhLwKkKAd-Y5ndb6YqGS9C3EGx9OQ/exec"
    allow="geolocation; clipboard-read; clipboard-write"
    style="width:100%;height:100%;border:none;"
  ></iframe>

<script>
(function() {
  var ua = navigator.userAgent || navigator.vendor || window.opera;

  // Detect Instagram or Facebook in-app browser
  var isInApp = /Instagram|FBAN|FBAV/i.test(ua);

  if (isInApp) {
    // Hide iframe
    var frame = document.querySelector("iframe");
    if (frame) frame.style.display = "none";

    // Overlay UI
    var overlay = document.createElement("div");
    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "#ffffff";
    overlay.style.zIndex = "9999";
    overlay.style.display = "flex";
    overlay.style.flexDirection = "column";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.textAlign = "center";
    overlay.style.padding = "20px";
    overlay.style.fontFamily = "Arial, sans-serif";

    overlay.innerHTML = `
      <h2 style="font-size:22px;">⚠️ Open in Browser</h2>
      <p style="font-size:16px; margin:15px 0;">
        For the best experience, open this in your browser.<br><br>
        Tap the button below or use the <b>⋮ menu</b> → <b>Open in Browser</b>.
      </p>

      <button onclick="forceOpen()" style="
        padding:15px 25px;
        font-size:16px;
        border:none;
        border-radius:10px;
        background:black;
        color:white;
        cursor:pointer;
      ">
        Open in Browser
      </button>
    `;

    document.body.appendChild(overlay);
  }
})();

function forceOpen() {
  var url = window.location.href;
  var ua = navigator.userAgent.toLowerCase();

  // ANDROID → try force Chrome
  if (/android/.test(ua)) {
    var chromeUrl = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = chromeUrl;

    // fallback if blocked
    setTimeout(function() {
      window.open(url, "_blank");
    }, 1500);
  } 
  else {
    // iPhone → opens in Safari (default)
    window.open(url, "_blank");
  }
}
</script>

</body>
</html>
